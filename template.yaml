AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless URL Shortener with API Gateway, Lambda and DynamoDB

Globals:
  Function:
    Timeout: 10
    Runtime: python3.13
    Environment:
      Variables:
        TABLE_NAME: !Ref UrlShortenerTable

Resources:
  UrlShortenerTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: ShortenerUrls
      PrimaryKey:
        Name: short_code
        Type: String

  CreateShortUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/create_short_url/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UrlShortenerTable
      Events:
        CreateShortUrl:
          Type: Api
          Properties:
            Path: /shorten
            Method: post

  RedirectUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/redirect_url/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UrlShortenerTable
      Events:
        RedirectUrl:
          Type: Api
          Properties:
            Path: /{code}
            Method: get

  GetStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/get_stats/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UrlShortenerTable
      Events:
        GetStats:
          Type: Api
          Properties:
            Path: /{code}/stats
            Method: get

Outputs:
  ApiUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod"
  TableName:
    Description: DynamoDB table name
    Value: !Ref UrlShortenerTable